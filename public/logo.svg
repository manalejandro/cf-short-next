<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bgGrad)"/>
  <!-- Chain link left -->
  <rect x="8" y="25" width="22" height="14" rx="7" fill="none" stroke="white" stroke-width="4"/>
  <!-- Chain link right -->
  <rect x="34" y="25" width="22" height="14" rx="7" fill="none" stroke="white" stroke-width="4"/>
  <!-- Connector -->
  <rect x="28" y="29" width="8" height="6" fill="white" rx="1"/>
  <!-- Arrow pointing right (speed/shortening) -->
  <path d="M20 44 L32 56 L44 44" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
</svg>
